<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 5 天 4 夜親子遊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 預留您的外部邏輯連結 -->
    <script src="data.js?v=20260208v4"></script>
    <script src="prompts.js?v=20260208v4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 底部抽屜樣式 */
        .bottom-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 90;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-handle {
            width: 40px; height: 4px; background: #e2e8f0;
            border-radius: 2px; margin: 12px auto;
        }

        /* 行程卡片 */
        .poi-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }
        .poi-card:active { transform: scale(0.98); }

        .time-badge {
            background: #eff6ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 底部導覽 */
        .nav-active { color: #2563eb; }
        .nav-active i { transform: translateY(-2px); transition: transform 0.2s; }
    </style>
</head>
<body class="pb-24">

    <!-- Loading 遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-500 text-sm font-medium">載入沖繩藍...</p>
    </div>

    <!-- 頂部 Header 與 頁籤 -->
    <header class="bg-white sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 id="header-main-title" class="text-xl font-bold tracking-tight text-slate-800">沖繩親子遊</h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Okinawa Family Trip 2026</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="location.reload()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-500"><i class="fas fa-sync-alt text-xs"></i></button>
                </div>
            </div>
            
            <!-- 導覽頁籤 -->
            <div class="flex bg-slate-100 rounded-2xl p-1">
                <button onclick="switchMainTab('itinerary')" id="main-tab-itinerary" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white text-blue-600 shadow-sm">行程規劃</button>
                <button onclick="switchMainTab('preparation')" id="main-tab-preparation" class="flex-1 py-2 text-sm font-bold rounded-xl text-slate-500 transition-all">行前準備</button>
                <button onclick="switchMainTab('notes')" id="main-tab-notes" class="flex-1 py-2 text-sm font-bold rounded-xl text-slate-500 transition-all">注意事項</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- 行程規劃內容 -->
        <div id="content-itinerary" class="tab-content active">
            <!-- 日期選擇器 -->
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>
            <!-- 行程清單容器 -->
            <div id="days-container" class="space-y-4"></div>
        </div>

        <!-- 行前準備內容 -->
        <div id="content-preparation" class="tab-content">
            <div id="preparation-list" class="space-y-4"></div>
        </div>

        <!-- 注意事項內容 -->
        <div id="content-notes" class="tab-content">
            <div id="notes-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- [底部抽屜] 詳情資訊 / 交通住宿 / AI 助手 -->
    <div id="sheet-overlay" class="sheet-overlay" onclick="closeAllSheets()"></div>

    <!-- 1. 物流與住宿抽屜 -->
    <div id="logistics-sheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="px-6 pb-4 flex justify-between items-center">
            <h3 class="font-bold text-lg"><i class="fas fa-hotel mr-2 text-blue-600"></i>交通與住宿</h3>
            <button onclick="closeAllSheets()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="logistics-content" class="px-6 pb-10 overflow-y-auto space-y-3"></div>
    </div>

    <!-- 2. 景點詳情抽屜 -->
    <div id="detail-sheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="overflow-y-auto">
            <div class="relative h-48 bg-slate-100">
                <img id="detail-img" class="w-full h-full object-cover hidden" src="" alt="">
                <div id="detail-img-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-image text-4xl"></i></div>
                <button onclick="closeAllSheets()" class="absolute top-4 right-4 bg-black/20 backdrop-blur-md text-white w-8 h-8 rounded-full"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-6 pb-12">
                <div>
                    <span id="detail-category" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2 inline-block uppercase">CATEGORY</span>
                    <h2 id="detail-title" class="text-2xl font-bold text-slate-800">景點名稱</h2>
                </div>
                
                <div id="detail-info-grid" class="grid grid-cols-2 gap-3"></div>

                <div id="detail-parent-tips" class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-xl hidden">
                    <p class="text-[10px] font-bold text-orange-600 mb-1 uppercase tracking-wider"><i class="fas fa-baby mr-1"></i> 親子友善提醒</p>
                    <p id="detail-parent-content" class="text-sm text-orange-800 leading-relaxed"></p>
                </div>

                <div>
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">景點簡介</p>
                    <p id="detail-content" class="text-sm text-slate-600 leading-relaxed"></p>
                </div>

                <div id="detail-nav-footer" class="flex gap-2 pt-4"></div>
            </div>
        </div>
    </div>

    <!-- 3. AI 助手抽屜 -->
    <div id="ai-sheet" class="bottom-sheet h-[80vh]">
        <div class="sheet-handle"></div>
        <div class="px-6 pb-4 flex justify-between items-center border-b">
            <h3 class="font-bold text-lg text-purple-600"><i class="fas fa-robot mr-2"></i>沖繩旅遊助手</h3>
            <button onclick="closeAllSheets()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="ai-response-container" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-purple-50 p-4 rounded-2xl text-sm text-purple-800 border border-purple-100">你好！我是你的沖繩旅遊顧問。你可以問我關於行程、天氣或任何交通問題！</div>
        </div>
        <div id="ai-loading" class="hidden px-6 py-2 text-xs text-purple-500 italic animate-pulse">導遊思考中...</div>
        <form onsubmit="handleAIQuery(event)" class="p-4 bg-slate-50 border-t flex space-x-2">
            <input id="ai-input" type="text" placeholder="輸入問題..." class="flex-1 border-0 bg-white rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 shadow-sm">
            <button type="submit" class="bg-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-transform"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 px-8 py-3 flex justify-around items-center max-w-md mx-auto z-[80]">
        
        <button onclick="openSheet('logistics-sheet')" class="flex flex-col items-center text-slate-400">
            <i class="fas fa-hotel text-xl mb-1"></i>
            <span class="text-[10px] font-bold">交通住宿</span>
        </button>
        <button onclick="openSheet('ai-sheet')" class="flex flex-col items-center text-slate-400">
            <div class="w-12 h-12 bg-purple-600 text-white rounded-full flex items-center justify-center -mt-8 shadow-lg shadow-purple-200 border-4 border-white">
                <i class="fas fa-comment-dots text-lg"></i>
            </div>
            <span class="text-[10px] font-bold mt-1">問助手</span>
        </button>
    </nav>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz7DQ8aHMoZnU8znCePeKjjr02d2INfhrkGajzmRa-7N4HYnAkdoRyvxCXc1zsiAUs/exec"; 
        let currentTravelData = null;
        
        // 取得當前日期 (YYYY/M/D) 作為比對基準
        function getCurrentFormattedDate() {
            const now = new Date();
            // 轉換格式
           const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
            return formatter.format(now);
        };

        // 預設 Fallback 資料
        const okinawa_fallback_data = {
            metadata: { title: "沖繩親子 5 日遊 (Preview)" },
            logistics: [
                { icon: 'fa-plane', text: 'JAL 811 12:15 抵達' },
                { icon: 'fa-car', text: 'SKY 租車 - 豐田 Sienta' },
                { icon: 'fa-bed', text: '那霸休假酒店 (3 晚)' }
            ],
            itinerary: [
                { day: 1, date: "3/28", fullDate: "2026年3月28日 (六)", events: [
                    { time: "12:15", activity: "抵達那霸機場", poiId: "NAHA_AIR", desc: "領取行李與入關" },
                    { time: "15:00", activity: "波上宮", poiId: "NAMINOUYE", desc: "懸崖上的神社" }
                ]},
                { day: 2, date: "3/29", fullDate: "2026年3月29日 (日)", events: [
                    { time: "10:00", activity: "美麗海水族館", poiId: "CHURAUMI", desc: "看黑潮之海大水槽" }
                ]}
            ],
            pois: {
                "NAHA_AIR": { name: "那霸機場", category: "交通中心", detailedStory: "沖繩的門戶，二樓有豐富的伴手禮店。", infoSections: [{label: "提醒", content: "租車接駁在外面"}], parentTips: "出關後右側有哺乳室。" },
                "CHURAUMI": { name: "美麗海水族館", category: "人氣景點", img: "https://images.unsplash.com/photo-1509114397022-ed747cca3f65?auto=format&fit=crop&q=80&w=400", detailedStory: "世界第三大的水族館。", infoSections: [{label: "門票", content: "2180 JPY"}], parentTips: "海豚秀可以免費看。" }
            },
            preparation: [{ category: "🪪 必要證件", items: ["護照", "日文譯本", "台灣駕照"] }],
            notes: [{ title: "備註", icon: "fa-info-circle", content: ["注意防曬"] }]
        };

        async function fetchTripData() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (e) {
                return typeof travelData !== 'undefined' ? travelData : okinawa_fallback_data;
            }
        }

        // 核心渲染邏輯
        function renderApp() {
            const data = currentTravelData || okinawa_fallback_data;
            if (data.metadata?.title) document.getElementById('header-main-title').innerText = data.metadata.title;
            
            // 1. 取得當前日期
            const todayStr = getCurrentFormattedDate();

            // 2. 將 logistics 資料渲染到彈窗內容
            const logBox = document.getElementById('logistics-content');
            logBox.innerHTML = (data.logistics || []).map(l => `
                <div class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-blue-600 shadow-sm mr-4">
                        <i class="fas ${l.icon}"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">${l.text}</span>
                </div>
            `).join('');

            // 3. 處理行程與自動選擇日期
            const daysContainer = document.getElementById('days-container');
            const daySelector = document.getElementById('day-selector');
            daysContainer.innerHTML = ''; 
            
            // 根據天數決定日期選擇器的排版模式
            const days = data.itinerary || [];

            // 找出哪一天是今天。如果沒對應到，則預設為第一天
            let activeDayNum = days[0]?.day;
            days.forEach(d => {
                // 比對資料中的 fullDate (例如 2026年3月28日) 是否包含今天日期
                // 或者比對 date 欄位
                if (d.rawDate?.includes(todayStr) || d.date?.includes(todayStr)) {
                    activeDayNum = d.day;
                }
            });  

            const useScrollLayout = days.length > 5;
            daySelector.className = useScrollLayout 
                ? "flex overflow-x-auto no-scrollbar mb-6 py-2 gap-3" 
                : "flex mb-6 py-2 gap-3";

            days.forEach((day, idx) => {
                const isActive = idx === 0;
                const btn = document.createElement('button');
                btn.id = `day-btn-${day.day}`;
                btn.onclick = () => showDay(day.day);
                
                // 採用要求的設計樣式：底層圓角、字級、縮放與陰影特效
                btn.className = `day-btn shrink-0 ${
                    useScrollLayout 
                        ? "px-6 w-[28%]" 
                        : "flex-1"
                } py-2.5 rounded-2xl text-sm font-bold transition-all duration-300 ${
                    isActive 
                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 scale-105' 
                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                }`;
                
                // 格式化日期副標題
                const displayDate = day.date.includes('/') ? day.date : day.date; 
                btn.innerHTML = `
                    Day ${day.day}
                    <span class="block text-[10px] font-medium opacity-60">
                        ${displayDate}
                    </span>
                `;
                daySelector.appendChild(btn);

                const dayDiv = document.createElement('div');
                dayDiv.id = `day-content-${day.day}`;
                dayDiv.className = `space-y-3 hidden ${idx === 0 ? 'block' : ''}`;
                
                day.events.forEach(ev => {
                    const poi = data.pois?.[ev.poiId];
                    dayDiv.innerHTML += `
                        <div class="poi-card" onclick="openPoiDetail('${ev.poiId}')">
                            <div class="flex justify-between items-start mb-2">
                                <span class="time-badge">${ev.time}</span>
                                ${ev.isMeal ? '<i class="fas fa-utensils text-orange-400"></i>' : ''}
                            </div>
                            <h4 class="font-bold text-slate-800 text-lg mb-1">${ev.activity || ev.title}</h4>
                            <p class="text-xs text-slate-400 line-clamp-1">${ev.desc || poi?.desc || '點擊查看詳情'}</p>
                            <div class="flex mt-3 pt-3 border-t border-slate-50 gap-2">
                                <button onclick="event.stopPropagation(); window.open('${getNavUrl(poi?.navName || ev.activity)}')" class="flex-1 py-2 rounded-xl bg-slate-50 text-slate-600 text-[10px] font-bold flex items-center justify-center hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                    <i class="fas fa-location-arrow mr-1"></i> 導航
                                </button>
                                ${poi ? `<button class="flex-1 py-2 rounded-xl bg-blue-50 text-blue-600 text-[10px] font-bold">詳情資訊</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                daysContainer.appendChild(dayDiv);
            });

            // 初始執行一次切換，確保 UI 狀態一致（特別是捲動與按鈕顏色）
            showDay(activeDayNum);

            renderPrepAndNotes(data);
            
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
            }, 800);
        }

        function renderPrepAndNotes(data) {
            document.getElementById('preparation-list').innerHTML = (data.preparation || []).map(group => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-check-circle mr-2 text-blue-500"></i>${group.category}</h3>
                    <div class="space-y-3">
                        ${group.items.map(item => `<label class="flex items-center text-sm text-slate-600"><input type="checkbox" class="w-4 h-4 rounded-full mr-3 border-slate-200"> ${item}</label>`).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('notes-list').innerHTML = (data.notes || []).map(note => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="fas ${note.icon} mr-2 text-blue-500"></i>${note.title}</h3>
                    <ul class="text-sm text-slate-500 space-y-2 leading-relaxed">
                        ${note.content.map(li => `<li>• ${li}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        }

        // UI 切換邏輯
        function showDay(d) {
            // 切換內容容器
            document.querySelectorAll('[id^="day-content-"]').forEach(el => el.classList.add('hidden'));
            const targetContent = document.getElementById(`day-content-${d}`);
            if (targetContent) targetContent.classList.remove('hidden');
            
            // 切換按鈕狀態（對應參考程式碼的切換效果）
            document.querySelectorAll('[id^="day-btn-"]').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-200', 'scale-105');
                btn.classList.add('bg-slate-100', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`day-btn-${d}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-200', 'scale-105');
                activeBtn.classList.remove('bg-slate-100', 'text-slate-500');
                
                // 自動將選中的按鈕捲動到可視區域 (僅在 Scroll Layout 模式下有明顯作用)
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-' + tab).classList.add('active');
            
            const btns = ['itinerary', 'preparation', 'notes'];
            btns.forEach(b => {
                const el = document.getElementById('main-tab-' + b);
                if (b === tab) {
                    el.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                    el.classList.remove('text-slate-500');
                } else {
                    el.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                    el.classList.add('text-slate-500');
                }
            });
        }

        // 抽屜與詳情邏輯保持不變...
        function openSheet(id) {
            closeAllSheets();
            document.getElementById(id).classList.add('active');
            document.getElementById('sheet-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('sheet-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openPoiDetail(poiId) {
            const poi = (currentTravelData || okinawa_fallback_data).pois?.[poiId];
            if (!poi) return;
            document.getElementById('detail-title').innerText = poi.name;
            document.getElementById('detail-category').innerText = poi.category || "景點";
            document.getElementById('detail-content').innerText = poi.detailedStory || poi.desc || "暫無詳細資料。";
            const img = document.getElementById('detail-img');
            const placeholder = document.getElementById('detail-img-placeholder');
            if (poi.img) {
                img.src = poi.img; img.classList.remove('hidden'); placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden'); placeholder.classList.remove('hidden');
            }
            const grid = document.getElementById('detail-info-grid');
            grid.innerHTML = (poi.infoSections || []).map(s => `
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">${s.label}</p>
                    <p class="text-xs font-bold text-slate-700">${s.content}</p>
                </div>
            `).join('');
            const tipBox = document.getElementById('detail-parent-tips');
            if (poi.parentTips) {
                document.getElementById('detail-parent-content').innerText = poi.parentTips;
                tipBox.classList.remove('hidden');
            } else {
                tipBox.classList.add('hidden');
            }
            const footer = document.getElementById('detail-nav-footer');
            footer.innerHTML = `
                <a href="${getNavUrl(poi.navName || poi.name)}" target="_blank" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold text-sm text-center shadow-lg active:scale-95 transition-transform"><i class="fas fa-location-arrow mr-2"></i>開始導航</a>
            `;
            openSheet('detail-sheet');
        }

        function getNavUrl(dest) { return `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${encodeURIComponent(dest)}&travelmode=driving`; }

        async function handleAIQuery(e) {
            e.preventDefault();
            const input = document.getElementById('ai-input');
            const userText = input.value.trim();
            if (!userText) return;
            appendMsg(userText, 'user');
            input.value = '';
            document.getElementById('ai-loading').classList.remove('hidden');
            setTimeout(() => {
                appendMsg("正在為您規劃中最棒的行程建議...", 'ai');
                document.getElementById('ai-loading').classList.add('hidden');
            }, 1000);
        }

        function appendMsg(text, role) {
            const container = document.getElementById('ai-response-container');
            const div = document.createElement('div');
            div.className = role === 'user' 
                ? "bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none ml-10 text-sm shadow-sm" 
                : "bg-purple-50 p-4 rounded-2xl rounded-tl-none mr-10 text-sm border border-purple-100 shadow-sm";
            div.innerHTML = text.replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.onload = async () => {
            currentTravelData = await fetchTripData();
            renderApp();
        };
    </script>
</body>
</html>
