<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖繩 5 天 4 夜親子遊 (2026/3/28起)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- 引入外部資料與邏輯 -->
    <script src="data.js?v=20260208v4"></script>
    <script src="prompts.js?v=20260208v4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        .day-card { display: none; }
        .day-card.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 時間軸視覺樣式 */
        .timeline-container { position: relative; padding-left: 28px; margin-left: 4px; }
        .timeline-container::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: #e2e8f0; border-radius: 1px; }
        .timeline-item { position: relative; padding-bottom: 24px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot { position: absolute; left: -33px; top: 6px; width: 12px; height: 12px; border: 2px solid #fff; border-radius: 50%; z-index: 10; }
        .timeline-time { display: block; font-size: 0.8rem; font-weight: 700; color: #2563eb; margin-bottom: 2px; }
        .timeline-title { font-weight: 700; color: #1e293b; font-size: 1.05rem; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; }
        .timeline-desc { font-size: 0.85rem; color: #64748b; line-height: 1.6; }
        
        .action-btn { font-size: 10px; padding: 4px 8px; border-radius: 6px; margin-left: 6px; display: inline-flex; align-items: center; transition: all 0.2s; }
        .nav-btn { background-color: #dcfce7; color: #15803d; }
        .detail-btn { background-color: #e0f2fe; color: #0369a1; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .info-box { background: #f8fafc; padding: 8px; border-radius: 8px; border: 1px solid #f1f5f9; }
        .info-label { font-size: 10px; color: #94a3b8; font-weight: 700; display: block; }
        .info-value { font-size: 12px; color: #1e293b; font-weight: 500; }
        .parent-tip { background: #fff7ed; border-left: 4px solid #f97316; padding: 8px; border-radius: 4px; margin-top: 8px; }
        
        .day-card-enhanced { background-color: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
        .checklist-item { display: flex; align-items: center; padding: 8px 16px; transition: background 0.2s; cursor: pointer; }
        .checklist-item input[type="checkbox"] { width: 16px; height: 16px; margin-right: 12px; cursor: pointer; }
    </style>
</head>
<body class="pb-24">

    <!-- Loading 遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-bold animate-pulse">正在從 Google 讀取最新行程...</p>
    </div>

    <header class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex justify-between items-center mb-4">
                <h1 id="header-main-title" class="text-xl font-bold">🌸 沖繩初航 🌸</h1>
                <div class="flex space-x-2">
                    <!-- 取消按鍵
                    <button onclick="setupApiKey()" class="bg-white/20 p-2 rounded-full"><i class="fas fa-key text-sm"></i></button>
                     -->
                    <button onclick="toggleAIChat()" class="bg-white/20 p-2 rounded-full"><i class="fas fa-robot text-sm"></i></button>
                </div>
            </div>
            <div class="flex bg-blue-700/50 rounded-xl p-1 mb-2">
                <button onclick="switchMainTab('itinerary')" id="main-tab-itinerary" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white text-blue-700 shadow-sm transition-all">行程規劃</button>
                <button onclick="switchMainTab('preparation')" id="main-tab-preparation" class="flex-1 py-2 text-sm font-bold rounded-lg text-blue transition-all">行前準備</button>
                <button onclick="switchMainTab('notes')" id="main-tab-notes" class="flex-1 py-2 text-sm font-bold rounded-lg text-blue transition-all">注意事項</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="content-itinerary" class="tab-content active">
            <div id="day-selector" class="flex mb-6 text-xs"></div>
            <div id="days-container"></div>
        </div>
        <div id="content-preparation" class="tab-content">
            <div id="preparation-list" class="space-y-6"></div>
        </div>
        <div id="content-notes" class="tab-content">
            <div id="notes-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- [Modal] 交通與住宿資訊彈窗 (新增自 logistics-container 調整而來) -->
    <div id="logistics-modal" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-5 border-b bg-blue-600 text-white flex justify-between items-center">
                <h3 class="font-bold flex items-center"><i class="fas fa-hotel mr-2"></i>交通與住宿資訊</h3>
                <button onclick="closeLogistics()" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/20"><i class="fas fa-times"></i></button>
            </div>
            <div id="logistics-modal-content" class="p-6 space-y-4 text-sm text-gray-700">
                <!-- 由 JavaScript 動態填入 -->
            </div>
            <div class="p-4 border-t bg-slate-50 flex justify-end">
                <button onclick="closeLogistics()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs">關閉</button>
            </div>
        </div>
    </div>

    <!-- [Modal] 景點詳細資訊彈窗 -->
    <div id="detail-modal" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="relative h-48 bg-gray-200">
                <img id="detail-img" src="" alt="" class="w-full h-full object-cover hidden">
                <div id="detail-img-placeholder" class="w-full h-full flex items-center justify-center text-gray-400 bg-slate-100"><i class="fas fa-camera text-4xl"></i></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-4 right-4">
                    <span id="detail-category" class="bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-md mb-1 inline-block font-bold">景點類別</span>
                    <h3 id="detail-title" class="text-xl font-bold text-white"></h3>
                </div>
                <button onclick="closeDetail()" class="absolute top-3 right-3 bg-white/20 backdrop-blur-md text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fas fa-times text-sm"></i></button>
            </div>
            <div class="p-5 overflow-y-auto space-y-5">
                <!-- 基本資訊格線 -->
                <div class="info-grid" id="detail-info-grid"></div>
                
                <!-- 親子提醒 -->
                <div id="detail-parent-tips" class="parent-tip hidden">
                    <div class="text-[10px] font-bold text-orange-600 mb-1 flex items-center"><i class="fas fa-baby mr-1.5"></i>親子友善提醒</div>
                    <div id="detail-parent-content" class="text-xs text-orange-800 leading-relaxed"></div>
                </div>

                

                <!-- 詳細活動內容 -->
                <div>
                    <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest border-l-2 border-gray-300 pl-2">活動詳情</div>
                    <div id="detail-content" class="text-sm text-gray-600 leading-relaxed"></div>
                </div>

                <!-- 備案資訊  -->
                <div id="detail-backup-plan" class="bg-slate-50 p-3 rounded-xl border border-dashed border-slate-300 hidden">
                    <div class="text-[10px] font-bold text-slate-500 mb-1 flex items-center"><i class="fas fa-exchange-alt mr-1.5"></i>行程彈性與備案</div>
                    <div id="detail-backup-content" class="text-xs text-slate-600"></div>
                </div>
            </div>
            <div class="p-4 border-t bg-slate-50">
                <!-- 按鈕容器  -->
                <div id="detail-modal-nav-container" class="flex flex-wrap gap-2 mb-2"></div>
                <div class="flex justify-end mt-2"><button onclick="closeDetail()" class="text-slate-400 text-xs font-bold px-4 py-2">關閉視窗</button></div>
            </div>
        </div>
    </div>

    <!-- AI 助手彈窗 -->
    <div id="ai-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-4 border-b flex justify-between items-center bg-purple-600 text-white rounded-t-2xl">
                <div class="flex items-center space-x-2"><i class="fas fa-robot"></i><h3 class="font-bold text-sm">沖繩旅遊助手</h3></div>
                <button onclick="toggleAIChat()"><i class="fas fa-times"></i></button>
            </div>
            <div id="ai-response-container" class="p-4 overflow-y-auto flex-grow text-[11px] text-gray-700 leading-relaxed space-y-3">
                <div class="bg-purple-50 p-3 rounded-xl border border-purple-100">您好！我是您的資深沖繩導遊，請問有什麼我可以幫您的？</div>
            </div>
            <div id="ai-loading" class="hidden p-4 text-center text-purple-600 font-medium italic animate-pulse text-xs">導遊思考中...</div>
            <div class="p-4 border-t bg-gray-50 rounded-b-2xl">
                <form onsubmit="handleAIQuery(event)" class="p-4 border-t bg-gray-50 rounded-b-2xl flex space-x-2">
                    <input id="ai-input" type="text" placeholder="例如：今天幾點要去哪？" class="flex-grow border rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm">
                    <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-sm font-bold">傳送</button>
                </form>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center max-w-md mx-auto shadow-2xl z-40">
        <button onclick="openLogistics()" class="text-center text-blue-600"><i class="fas fa-hotel block text-lg"></i><span class="text-[10px] font-bold">交通&住宿</span></button>
        <button onclick="toggleAIChat()" class="text-center text-purple-600"><i class="fas fa-comments block text-lg"></i><span class="text-[10px] font-bold">問助手</span></button>
    </nav>

    <script>
        // *** 重要 放入 Google Apps Script 部署網址 ***
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz7DQ8aHMoZnU8znCePeKjjr02d2INfhrkGajzmRa-7N4HYnAkdoRyvxCXc1zsiAUs/exec"; 
        
        let currentTravelData = null;
        
        // 取得當前日期 (YYYY/M/D) 作為比對基準
        function getCurrentFormattedDate() {
            const now = new Date();
            // 轉換格式
           const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
            return formatter.format(now);
        };

                
        const okinawa_fallback_data = {
            metadata: {
                title: "沖繩親子五日遊 (預覽模式)",
                logistics: [
                    { icon: 'fa-plane-departure', text: 'JAL 預定航班' },
                    { icon: 'fa-car', text: 'SKY 租車預定' }
                ]
            },
            itinerary: [
                {
                    day: 1, date: "3/28", fullDate: "2026年3月28日 (六)",
                    events: [
                        { time: "12:15", poiId: "FALLBACK_ARR", activity: "抵達那霸機場" },
                        { time: "15:00", poiId: "FALLBACK_SHRINE", activity: "波上宮參拜" }
                    ]
                    
                },
                {
                    day: 2, date: "3/29", fullDate: "2026年3月29日 (日)",
                    events: [
                        { time: "15:00", poiId: "FALLBACK_SHRINE", activity: "波上宮參拜" }
                    ]
                }
            ],
            pois: {
                "FALLBACK_ARR": {
                    name: "那霸機場入關",
                    navName: "那覇空港",
                    category: "行政流程",
                    img: "https://images.unsplash.com/photo-1530521954074-e64f6810b32d?auto=format&fit=crop&q=80&w=400",
                    desc: "抵達與入關程序。請準備好 Visit Japan Web。",
                    detailedStory: "下飛機後跟隨 'Arrival' 指標前往證照查驗。沖繩機場入關通常比成田快。領完行李後通過稅關即可到達接機大廳。記得先連上機場 Wi-Fi 開啟 VJW。",
                    website: "https://www.naha-airport.co.jp/zh-hant/",
                    infoSections: [
                        { label: "必備", content: "VJW QR Code" },
                        { label: "順序", content: "查驗->行李->稅關" },
                        { label: "提醒", content: "肉製品禁入" }
                    ],
                    parentTips: "領行李處旁有寬敞育嬰室，建議先換完尿布再排隊等租車接駁。",
                    backupPlan: "若海關排隊超過 1 小時，聯繫租車公司告知會延後抵達。"
                },
                "FALLBACK_SHRINE": {
                    name: "波上宮", category: "熱門景點",
                    desc: "建立在懸崖上的神社。",
                    parentTips: "階梯較多，推車可放在下方平地。"
                }
            },
            preparation: [
                { category: "🪪 重要證件", style: "blue", items: ["護照", "日文譯本"] }
            ],
            notes: [
                { title: "自駕安全", icon: "fa-car", style: "green", content: ["記得右駕「左小右大」。"] }
            ]
        };

        async function fetchTripData() {
            try {
                // 嘗試從 GAS API 抓取
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error("API 響應錯誤");
                const data = await response.json();
                console.log("從雲端成功讀取行程");
                return data;
            } catch (e) {
                console.error("無法從雲端讀取，改用本地 data.js 或 fallback:", e);
                // 優先使用本地 data.js 的變數，最後才用 fallback
                return typeof travelData !== 'undefined' ? travelData : okinawa_fallback_data;
            }
        }
        

        const getTripData = () => currentTravelData || okinawa_fallback_data;

        function getNavUrl(dest) { return `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${encodeURIComponent(dest)}&travelmode=driving`; }

        function renderApp() {
            const data = getTripData();
            if (data.metadata?.title) document.getElementById('header-main-title').innerText = data.metadata.title;

            // 1. 取得當前日期
            const todayStr = getCurrentFormattedDate();
            
            // 2. 將 logistics 資料渲染到彈窗內容而非行程頁面頂部
            const logContent = document.getElementById('logistics-modal-content');
            const logistics = data.logistics || [];
            logContent.innerHTML = logistics.map(l => `<div class="flex items-center space-x-3 p-3 bg-blue-50 rounded-xl border border-blue-100"><i class="fas ${l.icon} text-blue-600 w-5"></i><span class="font-medium">${l.text}</span></div>`).join('');
            
            // 3. 處理行程與自動選擇日期
            const daysContainer = document.getElementById('days-container');
            const daySelector = document.getElementById('day-selector');
            daysContainer.innerHTML = ''; daySelector.innerHTML = '';
            
            const days = data.itinerary || [];

            // 修改：找出哪一天是今天。如果沒對應到，則預設為第一天
            let activeDayNum = days[0]?.day;
            days.forEach(d => {
                // 比對資料中的 fullDate (例如 2026年3月28日) 是否包含今天日期
                // 或者比對 date 欄位
                if (d.rawDate?.includes(todayStr) || d.date?.includes(todayStr)) {
                    activeDayNum = d.day;
                }
            });           
            
            const useScrollLayout = days.length > 5;
            daySelector.className = useScrollLayout
                ? "flex overflow-x-auto no-scrollbar mb-6 text-xs"
                : "flex mb-6 text-xs";
            days.forEach((dayObj, index) => {
                const isActive = index === 0;
                const btn = document.createElement('button');
                btn.id = `btn-${dayObj.day}`;
                btn.onclick = () => showDay(dayObj.day);
                btn.className = `day-btn ${
                  useScrollLayout
                    ? "flex-shrink-0 w-[18%]"
                    : "flex-1"
                } py-2 rounded-xl text-center transition ${
                  isActive 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'bg-white text-gray-600 border border-gray-100'
                }`;
                btn.innerHTML = `<div class="font-bold">Day ${dayObj.day}</div><div class="text-[9px] opacity-80">${dayObj.date}</div>`;

                daySelector.appendChild(btn);

                const card = document.createElement('div');
                card.id = `day-${dayObj.day}`;
                card.className = `day-card ${isActive ? 'active' : ''}`;
                
                let itemsHtml = '';
                (dayObj.events || []).forEach(item => {
                    const title = item.activity || item.title;
                    // 只在 pois 資料庫中確實存在該 ID 時才生成詳情按鈕
                    const poi = data.pois?.[item.poiId];
                    
                    const dotColor = item.isMeal ? '#f59e0b' : '#3b82f6';
                    // 生成導航按鈕
                    const navBtn = `<a href="${getNavUrl(poi?.navName || title)}" target="_blank" class="action-btn nav-btn">
                                        <i class="fas fa-directions mr-1"></i>導航
                                    </a>`;
                    
                    // 生成詳情按鈕（只有有 poi 才顯示）
                    const detailBtn = poi
                        ? `<button data-poi-id="${item.poiId}" class="action-btn detail-btn">
                                <i class="fas fa-info-circle mr-1"></i>詳情
                           </button>`
                        : '';
                    
                    itemsHtml += `
                        <div class="timeline-item">
                            <div class="timeline-dot" style="background: ${dotColor};"></div>
                            <span class="timeline-time">${item.time}</span>
                            <h3 class="timeline-title">
                                ${title}
                                ${navBtn}
                                ${detailBtn}
                            </h3>
                            <p class="timeline-desc">${item.desc || poi?.desc || ""}</p>
                        </div>`;
                });
                card.innerHTML = `<div class="mb-4 text-center"><span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-100">${dayObj.fullDate || dayObj.date}</span></div><div class="day-card-enhanced"><div class="timeline-container">${itemsHtml}</div></div>`;
                daysContainer.appendChild(card);
            });

            // 初始執行一次切換，確保 UI 狀態一致（特別是捲動與按鈕顏色）
            showDay(activeDayNum);
            
            renderPreparation(data);
            renderNotes(data);
            
            // 隱藏 Loading
            document.getElementById('loading-overlay').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
        }
        // 將詳情按鈕的事件監聽移出 renderApp 以免範疇衝突，並確保點擊能正確偵測
        document.addEventListener("click", function(e) {
            const btn = e.target.closest(".detail-btn");
            if (!btn) return;
        
            const poiId = btn.dataset.poiId;
            const data = getTripData();
            const poi = data.pois?.[poiId];
            if (!poi) return;
        
            openDetail(poi);
        });        ;        

        function openDetail(poi) {
            const title = poi.name || "詳情資訊";
            
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-category').innerText = poi.category || "";
            document.getElementById('detail-content').innerText = poi.detailedStory || poi.desc || "暫無詳細說明";
            
            const img = document.getElementById('detail-img');
            const placeholder = document.getElementById('detail-img-placeholder');
            if (poi.img) {
                img.src = poi.img;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
            
            const grid = document.getElementById('detail-info-grid');
            grid.innerHTML = '';
            const sections = poi.infoSections || [];
            sections.forEach(s => {
                grid.innerHTML += `<div class="info-box"><span class="info-label">${s.label}</span><span class="info-value font-bold">${s.content}</span></div>`;
            });
            
            const tipBox = document.getElementById('detail-parent-tips');
            if (poi.parentTips) {
                document.getElementById('detail-parent-content').innerText = poi.parentTips;
                tipBox.classList.remove('hidden');
            } else {
                tipBox.classList.add('hidden');
            }
        
            const backupBox = document.getElementById('detail-backup-plan');
            if (poi.backupPlan) {
                document.getElementById('detail-backup-content').innerText = poi.backupPlan;
                backupBox.classList.remove('hidden');
            } else {
                backupBox.classList.add('hidden');
            }
            
            const navContainer = document.getElementById('detail-modal-nav-container');
            navContainer.innerHTML = '';
            const mapQuery = encodeURIComponent(poi.navName || title);
            navContainer.innerHTML += `<a href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-xs flex items-center shadow-sm"><i class="fas fa-map-marked-alt mr-2 text-[10px]"></i>地圖</a>`;
            if (poi.website) navContainer.innerHTML += `<a href="${poi.website}" target="_blank" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold text-xs flex items-center shadow-sm"><i class="fas fa-globe mr-2 text-[10px]"></i>網頁</a>`;
            navContainer.innerHTML += `<a href="${getNavUrl(poi.navName || title)}" target="_blank" class="ml-auto bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-xs flex items-center shadow-sm"><i class="fas fa-location-arrow mr-2"></i>導航</a>`;            
        
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        // 新增開啟物流彈窗函式
        function openLogistics() { document.getElementById('logistics-modal').classList.remove('hidden'); }
        function closeLogistics() { document.getElementById('logistics-modal').classList.add('hidden'); }

        function renderPreparation(data) {
            const container = document.getElementById('preparation-list');
            if (!container || !data.preparation) return;
            container.innerHTML = data.preparation.map(group => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="bg-blue-50 px-4 py-3 border-b border-blue-100 font-bold text-blue-800">${group.category}</div>
                    <div class="p-2">${group.items.map(item => `<label class="checklist-item"><input type="checkbox" class="mr-3"><span class="text-sm text-gray-700">${item}</span></label>`).join('')}</div>
                </div>`).join('');
        }

        function renderNotes(data) {
            const container = document.getElementById('notes-list');
            if (!container || !data.notes) return;
            container.innerHTML = data.notes.map(note => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-blue-700 mb-3 border-b pb-2"><i class="fas ${note.icon} mr-2"></i>${note.title}</h3>
                    <ul class="text-xs text-gray-600 space-y-2">${note.content.map(li => `<li>• ${li}</li>`).join('')}</ul>
                </div>`).join('');
        }

        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

        function switchMainTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            ['itinerary', 'preparation', 'notes'].forEach(tab => {
                const btn = document.getElementById('main-tab-' + tab);
                if (tab === t) btn.classList.add('bg-white', 'text-blue-700');
                else btn.classList.remove('bg-white', 'text-blue-700');
            });
        }

        function showDay(d) {
            document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
            document.getElementById('day-' + d).classList.add('active');
            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                b.classList.add('bg-white', 'text-gray-600', 'border-gray-100');
            });
            document.getElementById('btn-' + d).classList.remove('bg-white', 'text-gray-600', 'border-gray-100');
            document.getElementById('btn-' + d).classList.add('bg-blue-600', 'text-white', 'shadow-md');
        }

        function toggleAIChat() { document.getElementById('ai-modal').classList.toggle('hidden'); }

        
        function setupApiKey() {
            const key = prompt("請輸入您的 Gemini API Key:", localStorage.getItem('GEMINI_API_KEY') || "");
            if (key) localStorage.setItem('GEMINI_API_KEY', key);
        }

        // 20260220修正：優化後的 AI 查詢處理邏輯，整合 prompts.js
        async function handleAIQuery(e) {
            e.preventDefault();
            const input = document.getElementById('ai-input');
            const userText = input.value.trim();
            if (!userText) return;

            //const apiKey = localStorage.getItem('GEMINI_API_KEY');
            //if (!apiKey) { alert("請先設定 API Key"); return; }

            appendMsg(userText, 'user');
            input.value = '';
            document.getElementById('ai-loading').classList.remove('hidden');

            try {
                // 讀取當前完整行程資料做為 Context
                const currentDataStr = JSON.stringify(getTripData());
                
                // 呼叫 prompts.js 中的 buildFullPrompt 建立豐富的提示詞
                const fullPrompt = await AIPrompts.buildFullPrompt(userText, currentDataStr);

                // ✅ 修改為呼叫 Vercel 的後端 API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullPrompt: fullPrompt,
                        systemInstruction: AIPrompts.systemInstruction // 將系統指令也傳給後端
                    })
                });
        
                const result = await response.json();
                
                // Vercel 或 Google 回傳錯誤的處理
                if (!response.ok || result.error) {
                    throw new Error(result.error?.message || result.error || "連線異常");
                }
        
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我暫時無法回答。";
                appendMsg(aiText, 'ai');
            } catch (err) {
                appendMsg(`連線失敗: ${err.message}`, 'ai');
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }
        // 20260220修正結束

        function appendMsg(text, role) {
            const container = document.getElementById('ai-response-container');
            const div = document.createElement('div');
            div.className = role === 'user' ? "bg-blue-600 text-white p-3 rounded-xl ml-8" : "bg-purple-50 p-3 rounded-xl mr-8 border border-purple-100";
            div.innerHTML = text.replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 初始化：先抓資料再算
        window.onload = async () => {
            currentTravelData = await fetchTripData();
            renderApp();
        };      
    </script>
</body>
</html>
