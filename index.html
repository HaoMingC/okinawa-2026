<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 5 天 4 夜親子遊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="prompts.js?v=20260208v4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODIFIED: 行程切換動畫 --- */
        .day-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        /* --------------------------- */

        .full-page-detail {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            top: 40px; 
            background: white;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            z-index: 110;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -15px 35px -10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            will-change: transform;
        }
        .full-page-detail.active { transform: translateY(0); }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 100;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        
        .detail-transition {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .detail-enter-next { transform: translateX(20px); opacity: 0; }
        .detail-enter-prev { transform: translateX(-20px); opacity: 0; }

        #days-container {
            position: relative;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .poi-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.04);
            position: relative;
            cursor: pointer;
        }

        .day-btn.active-state {
            background-color: #2563eb !important;
            color: white !important;
            box-shadow: 0 8px 15px -3px rgba(37, 99, 235, 0.3) !important;
        }

        .time-badge {
            background: #eff6ff;
            color: #2563eb;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .floating-ai-btn {
            position: fixed;
            right: 20px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
            z-index: 80;
        }

        .header-drag-indicator {
            width: 36px; height: 4px; background: #e2e8f0;
            border-radius: 2px; margin: 8px auto 0;
        }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-500 text-sm font-medium">載入行程中...</p>
    </div>

    <header class="bg-white sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 id="header-main-title" class="text-xl font-bold tracking-tight text-slate-800">沖繩親子遊</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Family Trip 2026</p>
                </div>
                <button onclick="location.reload()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><i class="fas fa-sync-alt text-xs"></i></button>
            </div>
            
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-2">
                <button onclick="switchMainTab('itinerary')" id="main-tab-itinerary" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white text-blue-600 shadow-sm">行程</button>
                <button onclick="switchMainTab('logistics')" id="main-tab-logistics" class="flex-1 py-2 text-sm font-bold rounded-xl text-slate-500 transition-all">交通住宿</button>
                <button onclick="switchMainTab('preparation')" id="main-tab-preparation" class="flex-1 py-2 text-sm font-bold rounded-xl text-slate-500 transition-all">行李準備</button>
                <button onclick="switchMainTab('notes')" id="main-tab-notes" class="flex-1 py-2 text-sm font-bold rounded-xl text-slate-500 transition-all">須知事項</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24 overflow-x-hidden">
        <div id="content-itinerary" class="tab-content active">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>
            <div id="days-wrapper" class="overflow-visible">
                <div id="days-container"></div>
            </div>
        </div>
        <div id="content-logistics" class="tab-content">
            <div id="logistics-page-content" class="space-y-4"></div>
        </div>
        <div id="content-preparation" class="tab-content">
            <div id="preparation-list" class="space-y-4"></div>
        </div>
        <div id="content-notes" class="tab-content">
            <div id="notes-list" class="space-y-4"></div>
        </div>
    </main>

    <div id="ai-floating-trigger" class="floating-ai-btn" onclick="openSheet('ai-sheet')">
        <i class="fas fa-comment-dots text-xl"></i>
    </div>

    <div id="sheet-overlay" class="sheet-overlay" onclick="closeAllSheets()"></div>

    <div id="full-page-detail" class="full-page-detail">
        <div class="header-drag-indicator"></div>
        <header class="bg-white flex items-center justify-between px-4 h-14 shrink-0 mt-1">
            <div class="flex items-center gap-2">
                <button onclick="closeAllSheets()" class="w-10 h-10 flex items-center justify-center text-slate-800 text-lg bg-slate-50 rounded-full"><i class="fas fa-times"></i></button>
                <div class="ml-2">
                    <span id="detail-pagination" class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">3 / 8</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="prev-poi-btn" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full text-slate-400 active:text-blue-600 active:bg-blue-50 transition-colors"><i class="fas fa-chevron-left"></i></button>
                <button id="next-poi-btn" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full text-slate-400 active:text-blue-600 active:bg-blue-50 transition-colors"><i class="fas fa-chevron-right"></i></button>
            </div>
        </header>

        <div id="full-detail-content" class="flex-1 overflow-y-auto detail-transition">
            <div class="relative h-60 bg-slate-100">
                <img id="detail-img" class="w-full h-full object-cover hidden" src="" alt="">
                <div id="detail-img-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-image text-5xl"></i></div>
            </div>
            <div class="p-6 space-y-6 pb-24">
                <div>
                    <span id="detail-category" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2 inline-block uppercase tracking-wider">CATEGORY</span>
                    <h2 id="detail-title" class="text-2xl font-bold text-slate-800 leading-tight">景點名稱</h2>
                </div>
                
                <div id="detail-info-grid" class="grid grid-cols-2 gap-3"></div>
                
                <div>
                    <p class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">詳細資訊</p>
                    <p id="detail-content" class="text-sm text-slate-600 leading-relaxed"></p>
                </div>
                
                <div id="detail-parent-tips" class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-xl hidden">
                    <p class="text-[11px] font-bold text-orange-600 mb-1 uppercase tracking-wider"><i class="fas fa-baby mr-1"></i> 親子友善提醒</p>
                    <p id="detail-parent-content" class="text-sm text-orange-800 leading-relaxed"></p>
                </div>

                <div id="detail-backup-plan" class="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-xl hidden">
                    <p class="text-[11px] font-bold text-blue-600 mb-1 uppercase tracking-wider"><i class="fas fa-right-left mr-1"></i> 備案行程</p>
                    <p id="detail-backup-content" class="text-sm text-blue-800 leading-relaxed"></p>
                </div>

                <div id="detail-nav-footer" class="flex items-center gap-3 pt-4"></div>
            </div>
        </div>
    </div>

    <div id="ai-sheet" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-white rounded-t-[28px] h-[80vh] z-[120] transform translate-y-full transition-transform duration-300 shadow-2xl overflow-hidden flex flex-col">
        <div class="w-10 h-1.5 bg-slate-200 rounded-full mx-auto my-3"></div>
        <div class="px-6 pb-4 flex justify-between items-center border-b shrink-0">
            <h3 class="font-bold text-lg text-purple-600"><i class="fas fa-robot mr-2"></i>沖繩旅遊助手</h3>
            <button onclick="closeAllSheets()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="ai-response-container" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-purple-50 p-4 rounded-2xl text-sm text-purple-800 border border-purple-100">你好！我是你的沖繩旅遊顧問。你可以問我關於行程、天氣或任何交通問題！</div>
        </div>
        <div id="ai-loading" class="hidden px-6 py-2 text-xs text-purple-500 italic animate-pulse">導遊思考中...</div>
        <form onsubmit="handleAIQuery(event)" class="p-4 bg-slate-50 border-t flex space-x-2 shrink-0">
            <input id="ai-input" type="text" placeholder="輸入問題..." class="flex-1 border-0 bg-white rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 shadow-sm">
            <button type="submit" class="bg-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-transform"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        const CACHE_KEY = "trip-data";
        const VERSION_KEY = "trip-version";
        

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwZ9lvQOsMkuz1Zox4G9I39WC_s7sgQU_93U3ShYFekf4E657uBlnQF0E5btPv0AdEL/exec"; 
        let currentTravelData = null;
        let currentDayIdx = 1;
        let currentPoiId = null;
        
        /* --- MODIFIED: 優化載入流程，避免重複重新整理 --- */
        async function fetchTripData() {
            const cached = localStorage.getItem(CACHE_KEY);
            const cachedVersion = localStorage.getItem(VERSION_KEY);
            
            // 如果有快取，立刻回傳並在背景執行更新
            if (cached) {
                // 在小延遲後執行背景檢查，確保 UI 已經渲染完畢
                setTimeout(() => refreshInBackground(cachedVersion), 1000);
                return JSON.parse(cached);
            }
            
            // 完全沒快取時才執行 Fetch
            return await fetchFromNetwork();
        }

        async function fetchFromNetwork() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error("Network error");
                const data = await response.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(VERSION_KEY, data.version || "1.0");
                return data;
            } catch (e) {
                return typeof travelData !== 'undefined' ? travelData : okinawa_fallback_data;
            }
        }

        async function refreshInBackground(oldVersion) {
            try {
                const res = await fetch(GAS_API_URL);
                if (!res.ok) return;
                const newData = await res.json();

                // 只有當版本真的不同時才更新快取並重新渲染 UI
                if (newData.version !== oldVersion) {
                    console.log("偵測到新版本:", newData.version);
                    localStorage.setItem(CACHE_KEY, JSON.stringify(newData));
                    localStorage.setItem(VERSION_KEY, newData.version);
                    
                    // 為了不打斷用戶操作，不強制重新整理頁面，而是直接更新全域變數並重新渲染組件
                    currentTravelData = newData;
                    renderApp(true); // 傳入 true 表示是靜態更新，不顯示 Loading
                    console.log("UI 已在背景靜態更新完畢");
                }
            } catch (e) {
                console.warn("背景更新失敗:", e);
            }
        }
        /* ------------------------------------------- */

        function renderApp() {
            const data = currentTravelData || okinawa_fallback_data;
            if (data.metadata?.title) document.getElementById('header-main-title').innerText = data.metadata.title;
            
            const daysContainer = document.getElementById('days-container');
            const daySelector = document.getElementById('day-selector');
            daysContainer.innerHTML = ''; 
            daySelector.innerHTML = '';
            
            const days = data.itinerary || [];
            days.forEach((day) => {
                const btn = document.createElement('button');
                btn.id = `day-btn-${day.day}`;
                btn.onclick = () => showDay(day.day);
                btn.className = `day-btn shrink-0 flex-1 py-2.5 rounded-2xl text-sm font-bold transition-all duration-300 bg-slate-100 text-slate-500`;
                btn.innerHTML = `Day ${day.day}<span class="block text-[10px] font-medium opacity-60">${day.date}</span>`;
                daySelector.appendChild(btn);

                const dayDiv = document.createElement('div');
                dayDiv.id = `day-content-${day.day}`;
                dayDiv.className = `space-y-4 hidden pb-10 day-fade`;
                
                day.events.forEach(ev => {
                    const poi = data.pois?.[ev.poiId];
                    dayDiv.innerHTML += `
                        <div class="poi-card" onclick="openPoiDetail('${ev.poiId}', ${day.day})">
                            <div class="flex justify-between items-start mb-2">
                                <span class="time-badge"> <i class="fas fa-clock mr-2"></i> ${ev.time}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex-1">
                                    <h4 class="font-bold text-slate-800 text-lg leading-tight mb-1 pr-4">${ev.activity || ev.title}</h4>
                                    <p class="text-xs text-slate-400 line-clamp-1 pr-4">${ev.desc || poi?.desc || '點擊查看詳情'}</p>
                                </div>
                                <button onclick="event.stopPropagation(); window.open('${getNavUrl(poi?.navName || ev.activity)}')" 
                                    class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center active:bg-blue-600 active:text-white transition-colors">
                                    <i class="fas fa-location-arrow text-sm"></i>
                                </button>
                            </div>                           
                        </div>
                    `;
                });
                daysContainer.appendChild(dayDiv);
            });

            renderStaticPages(data);

            showDay(1);
            initGestures();

            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.classList.add('hidden'), 500);
            }, 600);
        }

        function renderStaticPages(data) {
             const logBox = document.getElementById('logistics-page-content');
            logBox.innerHTML = (data.logistics || []).map(l => `
                <div class="flex items-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 mr-4 text-xl">
                        <i class="fas ${l.icon}"></i>
                    </div>
                    <span class="font-bold text-slate-700">${l.text}</span>
                </div>
            `).join('');

            const prepList = document.getElementById('preparation-list');
            prepList.innerHTML = '';
            (data.preparation || []).forEach(cat => {
                prepList.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                        <h4 class="font-bold text-slate-800 mb-3 text-sm border-b pb-2 uppercase tracking-wider">${cat.category}</h4>
                        <ul class="space-y-2">
                            ${cat.items.map(i => `<li class="flex items-center text-sm text-slate-600"><i class="far fa-square mr-2 text-slate-300"></i>${i}</li>`).join('')}
                        </ul>
                    </div>
                `;
            });

            const notesList = document.getElementById('notes-list');
            notesList.innerHTML = (data.notes || []).map(note => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="fas ${note.icon} mr-2 text-blue-500"></i>${note.title}</h3>
                    <ul class="text-sm text-slate-500 space-y-2 leading-relaxed">
                        ${note.content.map(li => `<li>• ${li}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function openPoiDetail(poiId, dayIdx, direction = null) {
            currentPoiId = poiId;
            currentDayIdx = dayIdx;
            const poi = currentTravelData.pois[poiId];
            const dayData = currentTravelData.itinerary.find(d => d.day === dayIdx);
            const eventIdx = dayData.events.findIndex(ev => ev.poiId === poiId);
            
            const content = document.getElementById('full-detail-content');
            
            if (direction) {
                content.classList.add(direction === 'next' ? 'detail-enter-next' : 'detail-enter-prev');
                setTimeout(() => {
                    updateDetailUI(poi, dayData.events, eventIdx);
                    content.classList.remove('detail-enter-next', 'detail-enter-prev');
                }, 150);
            } else {
                updateDetailUI(poi, dayData.events, eventIdx);
                openSheet('full-page-detail');
            }
        }

        function updateDetailUI(poi, events, idx) {
            document.getElementById('detail-pagination').innerText = `${idx + 1} / ${events.length}`;
            document.getElementById('detail-title').innerText = poi.name;
            document.getElementById('detail-category').innerText = poi.category || "景點行程";
            document.getElementById('detail-content').innerText = poi.detailedStory || poi.desc || "暫無詳細資料。";
            
            const img = document.getElementById('detail-img');
            const placeholder = document.getElementById('detail-img-placeholder');
            if (poi.img) {
                img.src = poi.img; img.classList.remove('hidden'); placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden'); placeholder.classList.remove('hidden');
            }

            document.getElementById('detail-info-grid').innerHTML = (poi.infoSections || []).map(s => `
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${s.label}</p>
                    <p class="text-xs font-bold text-slate-700">${s.content}</p>
                </div>
            `).join('');

            const backupBox = document.getElementById('detail-backup-plan');
            if (poi.backupPlan) {
                document.getElementById('detail-backup-content').innerText = poi.backupPlan;
                backupBox.classList.remove('hidden');
            } else {
                backupBox.classList.add('hidden');
            }

            const tipBox = document.getElementById('detail-parent-tips');
            if (poi.parentTips) {
                document.getElementById('detail-parent-content').innerText = poi.parentTips;
                tipBox.classList.remove('hidden');
            } else {
                tipBox.classList.add('hidden');
            }

            document.getElementById('detail-nav-footer').innerHTML = `
                <button onclick="window.open('${getNavUrl(poi.navName || poi.name)}')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-transform"><i class="fas fa-location-arrow mr-2"></i> 開始導航</button>
                ${poi.website ? `<button onclick="window.open('${poi.website}')" class="w-14 h-14 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center active:scale-95 transition-transform"><i class="fas fa-globe text-xl"></i></button>` : ''}
            `;

            document.getElementById('prev-poi-btn').onclick = () => idx > 0 && openPoiDetail(events[idx - 1].poiId, currentDayIdx, 'prev');
            document.getElementById('next-poi-btn').onclick = () => idx < events.length - 1 && openPoiDetail(events[idx + 1].poiId, currentDayIdx, 'next');
            document.getElementById('prev-poi-btn').style.opacity = idx === 0 ? '0.2' : '1';
            document.getElementById('next-poi-btn').style.opacity = idx === events.length - 1 ? '0.2' : '1';
        }

        /* --- MODIFIED: 更新後的手勢邏輯 --- */
        function initGestures() {
            const fullPage = document.getElementById('full-page-detail');
            const mainContainer = document.getElementById('days-container');
            const content = document.getElementById('full-detail-content');
            
            let startX = 0, startY = 0;
            let isDraggingDown = false;

            // 行程頁面左右切換
            mainContainer.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            }, { passive: true });

            mainContainer.addEventListener('touchend', (e) => {
                const deltaX = e.changedTouches[0].clientX - startX;
                const totalDays = currentTravelData?.itinerary?.length || 0;
                
                if (Math.abs(deltaX) > 80) {
                    if (deltaX > 0 && currentDayIdx > 1) {
                        showDay(currentDayIdx - 1);
                    } else if (deltaX < 0 && currentDayIdx < totalDays) {
                        showDay(currentDayIdx + 1);
                    }
                }
            }, { passive: true });
            
            // 詳情頁面手勢 (側邊返回、下滑關閉)
            fullPage.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isDraggingDown = false;
            }, { passive: true });

            fullPage.addEventListener('touchmove', (e) => {
                const currentY = e.touches[0].clientY;
                const deltaY = currentY - startY;
                
                // 只有當 scrollTop 為 0 且向下滑動時才準備關閉
                if (content.scrollTop <= 0 && deltaY > 10) {
                    isDraggingDown = true;
                } else {
                    isDraggingDown = false;
                }
            }, { passive: true });

            fullPage.addEventListener('touchend', (e) => {
                const deltaX = e.changedTouches[0].clientX - startX;
                const deltaY = e.changedTouches[0].clientY - startY;

                // 1. 側邊返回功能 (螢幕左側開始向右滑)
                if (startX < 60 && deltaX > 80) {
                    closeAllSheets();
                    return;
                }

                // 2. 下滑關閉功能 (在頂部下滑超過閾值)
                if (isDraggingDown && deltaY > 100) {
                    closeAllSheets();
                }
            }, { passive: true });

            // 詳情內容左右切換景點
            content.addEventListener('touchstart', (e) => startX = e.touches[0].clientX, { passive: true });
            content.addEventListener('touchend', (e) => {
                const deltaX = e.changedTouches[0].clientX - startX;
                // 避免與側滑返回衝突，中心區域才觸發景點切換
                if (startX > 60 && Math.abs(deltaX) > 100) {
                    if (deltaX > 100) document.getElementById('prev-poi-btn').click();
                    else if (deltaX < -100) document.getElementById('next-poi-btn').click();
                }
            }, { passive: true });
        }
        /* --------------------------- */

        function showDay(d) {
            document.querySelectorAll('[id^="day-content-"]').forEach(c => c.classList.add('hidden'));
            const targetDay = document.getElementById(`day-content-${d}`);
            if (targetDay) targetDay.classList.remove('hidden');
            
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active-state'));
            const targetBtn = document.getElementById(`day-btn-${d}`);
            if (targetBtn) targetBtn.classList.add('active-state');
            currentDayIdx = d;
            
            /* --- MODIFIED: 自動捲動標題列 --- */
            if (targetBtn) {
                targetBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const targetContent = document.getElementById('content-' + tab);
            if (targetContent) targetContent.classList.add('active');
            
            document.querySelectorAll('[id^="main-tab-"]').forEach(el => {
                el.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                el.classList.add('text-slate-500');
            });
            const activeTabBtn = document.getElementById('main-tab-' + tab);
            if (activeTabBtn) {
                activeTabBtn.classList.remove('text-slate-500');
                activeTabBtn.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
            }
        }

        function openSheet(id) {
            const sheet = document.getElementById(id);
            if (!sheet) return;
            sheet.classList.add('active');
            document.getElementById('sheet-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            if (id === 'ai-sheet') sheet.style.transform = 'translateY(0)';
        }

        function closeAllSheets() {
            document.getElementById('full-page-detail').classList.remove('active');
            const aiSheet = document.getElementById('ai-sheet');
            if (aiSheet) aiSheet.style.transform = 'translateY(100%)';
            document.getElementById('sheet-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function getNavUrl(dest) { return `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${encodeURIComponent(dest)}&travelmode=driving`; }

        async function handleAIQuery(e) {
            e.preventDefault();
            const input = document.getElementById('ai-input');
            const userText = input.value.trim();
            if (!userText) return;
            appendMsg(userText, 'user');
            input.value = '';
            document.getElementById('ai-loading').classList.remove('hidden');
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullPrompt: await AIPrompts.buildFullPrompt(userText, JSON.stringify(currentTravelData)),
                        systemInstruction: AIPrompts.systemInstruction 
                    })
                });
                const result = await response.json();
                appendMsg(result.candidates?.[0]?.content?.parts?.[0]?.text || "導遊休息中。", 'ai');
            } catch (err) {
                appendMsg(`連線失敗。`, 'ai');
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        function appendMsg(text, role) {
            const container = document.getElementById('ai-response-container');
            if (!container) return;
            const div = document.createElement('div');
            div.className = role === 'user' ? "bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none ml-10 text-sm" : "bg-purple-50 p-4 rounded-2xl rounded-tl-none mr-10 text-sm border border-purple-100";
            div.innerHTML = text.replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.onload = async () => {
            currentTravelData = await fetchTripData();
            renderApp();
        };
    </script>
</body>
</html>
