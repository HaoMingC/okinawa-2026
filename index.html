<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 5 天 4 夜親子遊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="prompts.js?v=20260208v4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 抽屜特效優化與性能提升 */
        .bottom-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(100%);
            transition: transform 0.25s ease-out; 
            will-change: transform;
            z-index: 100;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 90;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        
        .drag-handle-container {
            width: 100%;
            padding: 12px 0;
            cursor: grab;
            touch-action: none; 
        }
        .sheet-handle {
            width: 40px; height: 5px; background: #cbd5e1;
            border-radius: 10px; margin: 0 auto;
        }

        /* 修改段落 1: 行程容器左右滑動切換特效 */
        #days-container {
            position: relative;
            width: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            touch-action: pan-y; 
        }
        .day-slide-enter { transform: translateX(30px); opacity: 0; }
        .day-slide-exit { transform: translateX(-30px); opacity: 0; }

        .poi-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }

        .day-btn {
            outline: none !important;
            -webkit-appearance: none;
        }
        .day-btn.active-state {
            background-color: #2563eb !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3) !important;
            transform: scale(1.05);
        }

        .time-badge {
            background: #eff6ff;
            color: #2563eb;
            font-size: 14px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .floating-ai-btn {
            position: fixed;
            right: 20px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
            z-index: 80;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-ai-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <!-- Loading 遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-500 text-sm font-medium">載入行程中...</p>
    </div>

    <!-- 頂部 Header 與 頁籤 -->
    <header class="bg-white sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 id="header-main-title" class="text-xl font-bold tracking-tight text-slate-800">沖繩親子遊</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Family Trip 2026</p>
                </div>
                <button onclick="location.reload()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><i class="fas fa-sync-alt text-xs"></i></button>
            </div>
            
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-2">
                <button onclick="switchMainTab('itinerary')" id="main-tab-itinerary" class="flex-1 py-2 text-m font-bold rounded-xl transition-all bg-white text-blue-600 shadow-sm">行程</button>
                <button onclick="switchMainTab('logistics')" id="main-tab-logistics" class="flex-1 py-2 text-m font-bold rounded-xl text-slate-500 transition-all">交通住宿</button>
                <button onclick="switchMainTab('preparation')" id="main-tab-preparation" class="flex-1 py-2 text-m font-bold rounded-xl text-slate-500 transition-all">行李準備</button>
                <button onclick="switchMainTab('notes')" id="main-tab-notes" class="flex-1 py-2 text-m font-bold rounded-xl text-slate-500 transition-all">須知事項</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24 overflow-x-hidden">
        <div id="content-itinerary" class="tab-content active">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>
            <div id="days-wrapper" class="overflow-visible">
                <div id="days-container"></div>
            </div>
        </div>

        <div id="content-logistics" class="tab-content">
            <div id="logistics-page-content" class="space-y-3"></div>
        </div>

        <div id="content-preparation" class="tab-content">
            <div id="preparation-list" class="space-y-4"></div>
        </div>

        <div id="content-notes" class="tab-content">
            <div id="notes-list" class="space-y-4"></div>
        </div>
    </main>

    <div id="ai-floating-trigger" class="floating-ai-btn" onclick="openSheet('ai-sheet')">
        <i class="fas fa-comment-dots text-xl"></i>
    </div>

    <div id="sheet-overlay" class="sheet-overlay" onclick="closeAllSheets()"></div>

    <div id="detail-sheet" class="bottom-sheet">
        <div class="drag-handle-container" id="handle-detail">
            <div class="sheet-handle"></div>
        </div>
        <!-- 修改段落 2: 詳情內容容器增加動畫過渡樣式 -->
        <div id="detail-content-wrapper" class="overflow-y-auto transition-all duration-300 ease-out">
            <div class="relative h-48 bg-slate-100">
                <img id="detail-img" class="w-full h-full object-cover hidden" src="" alt="">
                <div id="detail-img-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-image text-4xl"></i></div>
                <button onclick="closeAllSheets()" class="absolute top-4 right-4 bg-black/20 backdrop-blur-md text-white w-8 h-8 rounded-full"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-6 pb-12">
                <div>
                    <span id="detail-category" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2 inline-block uppercase">CATEGORY</span>
                    <h2 id="detail-title" class="text-2xl font-bold text-slate-800">景點名稱</h2>
                </div>
                
                <div id="detail-info-grid" class="grid grid-cols-2 gap-3"></div>

                <div id="detail-parent-tips" class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-xl hidden">
                    <p class="text-[11px] font-bold text-orange-600 mb-1 uppercase tracking-wider"><i class="fas fa-baby mr-1"></i> 親子友善提醒</p>
                    <p id="detail-parent-content" class="text-sm text-orange-800 leading-relaxed"></p>
                </div>

                <div>
                    <p class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">景點簡介</p>
                    <p id="detail-content" class="text-sm text-slate-600 leading-relaxed"></p>
                </div>

                <div id="detail-nav-footer" class="flex items-center gap-3 pt-4"></div>
            </div>
        </div>
    </div>

    <div id="ai-sheet" class="bottom-sheet h-[80vh]">
        <div class="drag-handle-container" id="handle-ai">
            <div class="sheet-handle"></div>
        </div>
        <div class="px-6 pb-4 flex justify-between items-center border-b">
            <h3 class="font-bold text-lg text-purple-600"><i class="fas fa-robot mr-2"></i>沖繩旅遊助手</h3>
            <button onclick="closeAllSheets()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="ai-response-container" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-purple-50 p-4 rounded-2xl text-sm text-purple-800 border border-purple-100">你好！我是你的沖繩旅遊顧問。你可以問我關於行程、天氣或任何交通問題！</div>
        </div>
        <div id="ai-loading" class="hidden px-6 py-2 text-xs text-purple-500 italic animate-pulse">導遊思考中...</div>
        <form onsubmit="handleAIQuery(event)" class="p-4 bg-slate-50 border-t flex space-x-2">
            <input id="ai-input" type="text" placeholder="輸入問題..." class="flex-1 border-0 bg-white rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 shadow-sm">
            <button type="submit" class="bg-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-transform"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz7DQ8aHMoZnU8znCePeKjjr02d2INfhrkGajzmRa-7N4HYnAkdoRyvxCXc1zsiAUs/exec"; 
        let currentTravelData = null;
        let currentDayIdx = 1;
        let currentPoiId = null;
        
        function getCurrentFormattedDate() {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
            return formatter.format(now);
        };

        async function fetchTripData() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (e) {
                return typeof travelData !== 'undefined' ? travelData : okinawa_fallback_data;
            }
        }

        function renderApp() {
            const data = currentTravelData || okinawa_fallback_data;
            if (data.metadata?.title) document.getElementById('header-main-title').innerText = data.metadata.title;
            
            const todayStr = getCurrentFormattedDate();

            const logBox = document.getElementById('logistics-page-content');
            logBox.innerHTML = (data.logistics || []).map(l => `
                <div class="flex items-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 mr-4 text-xl">
                        <i class="fas ${l.icon}"></i>
                    </div>
                    <span class="font-bold text-slate-700">${l.text}</span>
                </div>
            `).join('');

            const daysContainer = document.getElementById('days-container');
            const daySelector = document.getElementById('day-selector');
            daysContainer.innerHTML = ''; 
            daySelector.innerHTML = '';
            
            const days = data.itinerary || [];
            let activeDayNum = days[0]?.day;
            days.forEach(d => {
                if (d.rawDate?.includes(todayStr) || d.date?.includes(todayStr)) {
                    activeDayNum = d.day;
                }
            });  

            const useScrollLayout = days.length > 5;
            daySelector.className = useScrollLayout 
                ? "flex overflow-x-auto no-scrollbar mb-6 py-2 gap-3" 
                : "flex mb-6 py-2 gap-3";

            days.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.id = `day-btn-${day.day}`;
                btn.onclick = () => showDay(day.day);
                btn.className = `day-btn shrink-0 ${useScrollLayout ? "px-6 w-[28%]" : "flex-1"} py-2.5 rounded-2xl text-sm font-bold transition-all duration-300 bg-slate-100 text-slate-500`;
                
                btn.innerHTML = `
                    Day ${day.day}
                    <span class="block text-[10px] font-medium opacity-60">${day.date}</span>
                `;
                daySelector.appendChild(btn);

                const dayDiv = document.createElement('div');
                dayDiv.id = `day-content-${day.day}`;
                dayDiv.className = `space-y-4 hidden pb-10`;
                
                day.events.forEach(ev => {
                    const poi = data.pois?.[ev.poiId];
                    // 修改段落 3: 導覽按鈕改為圓形
                    dayDiv.innerHTML += `
                        <div class="poi-card" onclick="openPoiDetail('${ev.poiId}', ${day.day})">
                            <div class="flex justify-between items-start mb-2">
                                <span class="time-badge"> <i class="fas fa-clock mr-2"></i> ${ev.time}</span>
                                ${ev.isMeal ? '<i class="fas fa-utensils text-orange-400"></i>' : ''}
                            </div>
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex-1">
                                    <h4 class="font-bold text-slate-800 text-lg leading-tight mb-2 pr-4">${ev.activity || ev.title}</h4>
                                    <p class="text-xs text-slate-400 line-clamp-2 pr-4 leading-relaxed">${ev.desc || poi?.desc || '點擊查看詳細行程資訊'}</p>
                                </div>
                                <span class="flex items-center justify-end">
                                    <button onclick="event.stopPropagation(); window.open('${getNavUrl(poi?.navName || ev.activity)}')" 
                                        class="bg-blue-600 text-white w-12 h-12 rounded-full text-xl font-bold flex items-center justify-center shadow-md shadow-blue-100 active:scale-95 transition-all">
                                        <i class="fas fa-location-arrow"></i> 
                                    </button>
                                </span>
                            </div>                           
                        </div>
                    `;
                });
                daysContainer.appendChild(dayDiv);
            });

            showDay(activeDayNum);
            renderPrepAndNotes(data);
            initMainSwipeGesture(); 

            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
            }, 800);
        }

        function renderPrepAndNotes(data) {
            document.getElementById('preparation-list').innerHTML = (data.preparation || []).map(group => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-check-circle mr-2 text-blue-500"></i>${group.category}</h3>
                    <div class="space-y-3">
                        ${group.items.map(item => `<label class="flex items-center text-sm text-slate-600"><input type="checkbox" class="w-5 h-5 rounded-lg mr-3 border-slate-200 text-blue-600"> ${item}</label>`).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('notes-list').innerHTML = (data.notes || []).map(note => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="fas ${note.icon} mr-2 text-blue-500"></i>${note.title}</h3>
                    <ul class="text-sm text-slate-500 space-y-2 leading-relaxed">
                        ${note.content.map(li => `<li>• ${li}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        }

        // 修改段落 1: 行程切換增加滑動特效
        function showDay(d, direction = 0) {
            const container = document.getElementById('days-container');
            const targetDay = document.getElementById(`day-content-${d}`);
            const currentDay = document.getElementById(`day-content-${currentDayIdx}`);

            if (d === currentDayIdx) {
                if (targetDay) targetDay.classList.remove('hidden');
            } else {
                // 套用進場與出場特效
                const enterClass = direction > 0 ? 'day-slide-enter' : (direction < 0 ? 'day-slide-exit' : '');
                const exitClass = direction > 0 ? 'day-slide-exit' : (direction < 0 ? 'day-slide-enter' : '');
                
                if (currentDay) {
                    currentDay.style.transition = 'all 0.3s ease';
                    currentDay.style.opacity = '0';
                    currentDay.style.transform = direction > 0 ? 'translateX(-30px)' : 'translateX(30px)';
                    setTimeout(() => currentDay.classList.add('hidden'), 300);
                }

                if (targetDay) {
                    targetDay.classList.remove('hidden');
                    targetDay.style.opacity = '0';
                    targetDay.style.transform = direction > 0 ? 'translateX(30px)' : 'translateX(-30px)';
                    // 強制重繪
                    targetDay.offsetHeight;
                    targetDay.style.transition = 'all 0.3s ease';
                    targetDay.style.opacity = '1';
                    targetDay.style.transform = 'translateX(0)';
                }
            }
            
            currentDayIdx = d;
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active-state'));
            const activeBtn = document.getElementById(`day-btn-${d}`);
            if (activeBtn) {
                activeBtn.classList.add('active-state');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-' + tab).classList.add('active');
            
            const btns = ['itinerary', 'logistics', 'preparation', 'notes'];
            btns.forEach(b => {
                const el = document.getElementById('main-tab-' + b);
                if (b === tab) {
                    el.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                    el.classList.remove('text-slate-500');
                } else {
                    el.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                    el.classList.add('text-slate-500');
                }
            });
        }

        // 修改段落 2: 修正詳情抽屜左右滑動功能
        function initSheetGestures(sheetId, handleId) {
            const sheet = document.getElementById(sheetId);
            const handle = document.getElementById(handleId);
            
            let startY = 0, currentY = 0, startX = 0, currentX = 0;
            let isVerticalDragging = false;
            let isHorizontalDragging = false;

            handle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                startX = e.touches[0].clientX;
                isVerticalDragging = true;
                sheet.style.transition = 'none';
            }, { passive: true });

            if (sheetId === 'detail-sheet') {
                const contentWrapper = document.getElementById('detail-content-wrapper');
                
                handle.addEventListener('touchmove', (e) => {
                    const moveY = e.touches[0].clientY;
                    const moveX = e.touches[0].clientX;
                    const deltaY = moveY - startY;
                    const deltaX = moveX - startX;

                    if (!isHorizontalDragging && deltaY > 0 && Math.abs(deltaY) > Math.abs(deltaX)) {
                        sheet.style.transform = `translateY(${deltaY}px)`;
                    } else if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                        isHorizontalDragging = true;
                        isVerticalDragging = false;
                    }

                    if (isHorizontalDragging) {
                        const events = currentTravelData.itinerary.find(d => d.day === currentDayIdx).events;
                        const eventIdx = events.findIndex(ev => ev.poiId === currentPoiId);
                        let dragX = deltaX;
                        if ((eventIdx === 0 && deltaX > 0) || (eventIdx === events.length - 1 && deltaX < 0)) {
                            dragX = deltaX * 0.3; 
                        }
                        contentWrapper.style.transform = `translateX(${dragX}px)`;
                        contentWrapper.style.opacity = (1 - Math.abs(deltaX) / 400);
                    }
                }, { passive: true });

                handle.addEventListener('touchend', (e) => {
                    const finalDeltaY = e.changedTouches[0].clientY - startY;
                    const finalDeltaX = e.changedTouches[0].clientX - startX;
                    
                    sheet.style.transition = 'transform 0.25s ease-out';
                    contentWrapper.style.transition = 'all 0.3s ease';

                    if (isVerticalDragging && finalDeltaY > 120) {
                        closeAllSheets();
                    } else if (isHorizontalDragging) {
                        const events = currentTravelData.itinerary.find(d => d.day === currentDayIdx).events;
                        const eventIdx = events.findIndex(ev => ev.poiId === currentPoiId);
                        
                        if (finalDeltaX > 80 && eventIdx > 0) {
                            // 前一個行程特效
                            contentWrapper.style.transform = 'translateX(50px)';
                            contentWrapper.style.opacity = '0';
                            setTimeout(() => {
                                openPoiDetail(events[eventIdx - 1].poiId, currentDayIdx);
                                contentWrapper.style.transform = 'translateX(-50px)';
                                setTimeout(() => {
                                    contentWrapper.style.transform = 'translateX(0)';
                                    contentWrapper.style.opacity = '1';
                                }, 50);
                            }, 150);
                        } else if (finalDeltaX < -80 && eventIdx < events.length - 1) {
                            // 下一個行程特效
                            contentWrapper.style.transform = 'translateX(-50px)';
                            contentWrapper.style.opacity = '0';
                            setTimeout(() => {
                                openPoiDetail(events[eventIdx + 1].poiId, currentDayIdx);
                                contentWrapper.style.transform = 'translateX(50px)';
                                setTimeout(() => {
                                    contentWrapper.style.transform = 'translateX(0)';
                                    contentWrapper.style.opacity = '1';
                                }, 50);
                            }, 150);
                        } else {
                            contentWrapper.style.transform = 'translateX(0)';
                            contentWrapper.style.opacity = '1';
                        }
                    }

                    sheet.style.transform = '';
                    isVerticalDragging = false;
                    isHorizontalDragging = false;
                });
            } else {
                handle.addEventListener('touchmove', (e) => {
                    const deltaY = e.touches[0].clientY - startY;
                    if (deltaY > 0) sheet.style.transform = `translateY(${deltaY}px)`;
                }, { passive: true });
                
                handle.addEventListener('touchend', (e) => {
                    const deltaY = e.changedTouches[0].clientY - startY;
                    sheet.style.transition = 'transform 0.25s ease-out';
                    if (deltaY > 120) closeAllSheets();
                    else sheet.style.transform = '';
                    isVerticalDragging = false;
                });
            }
        }

        function initMainSwipeGesture() {
            const container = document.getElementById('days-container');
            let startX = 0, currentX = 0, startY = 0;
            let isDragging = false;

            container.parentElement.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isDragging = true;
            }, { passive: true });

            container.parentElement.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX;
                const moveY = e.touches[0].clientY;
                const deltaX = currentX - startX;
                const deltaY = moveY - startY;

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    const totalDays = currentTravelData.itinerary.length;
                    let dragX = deltaX;
                    if ((currentDayIdx === 1 && deltaX > 0) || (currentDayIdx === totalDays && deltaX < 0)) {
                        dragX = deltaX * 0.3; 
                    }
                    container.style.transform = `translateX(${dragX}px)`;
                    container.style.opacity = (1 - Math.abs(deltaX) / 800);
                }
            }, { passive: true });

            container.parentElement.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                const finalDeltaX = e.changedTouches[0].clientX - startX;
                const totalDays = currentTravelData.itinerary.length;
                
                container.style.transition = 'all 0.3s ease';
                container.style.transform = 'translateX(0)';
                container.style.opacity = '1';

                if (finalDeltaX > 80 && currentDayIdx > 1) {
                    showDay(currentDayIdx - 1, -1);
                } else if (finalDeltaX < -80 && currentDayIdx < totalDays) {
                    showDay(currentDayIdx + 1, 1);
                }
                isDragging = false;
            });
        }

        function openSheet(id) {
            closeAllSheets();
            const sheet = document.getElementById(id);
            sheet.classList.add('active');
            document.getElementById('sheet-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('ai-floating-trigger').style.opacity = '0';
        }

        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => {
                s.classList.remove('active');
                s.style.transform = '';
            });
            document.getElementById('sheet-overlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('ai-floating-trigger').style.opacity = '1';
        }

        function openPoiDetail(poiId, dayIdx) {
            currentPoiId = poiId;
            currentDayIdx = dayIdx;
            const poi = (currentTravelData || okinawa_fallback_data).pois?.[poiId];
            if (!poi) return;
            
            document.getElementById('detail-title').innerText = poi.name;
            document.getElementById('detail-category').innerText = poi.category || "景點";
            document.getElementById('detail-content').innerText = poi.detailedStory || poi.desc || "暫無詳細資料。";
            
            const img = document.getElementById('detail-img');
            const placeholder = document.getElementById('detail-img-placeholder');
            if (poi.img) {
                img.src = poi.img; img.classList.remove('hidden'); placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden'); placeholder.classList.remove('hidden');
            }
            
            const grid = document.getElementById('detail-info-grid');
            grid.innerHTML = (poi.infoSections || []).map(s => `
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-[11px] font-bold text-slate-400 uppercase">${s.label}</p>
                    <p class="text-xs font-bold text-slate-700">${s.content}</p>
                </div>
            `).join('');
            
            const tipBox = document.getElementById('detail-parent-tips');
            if (poi.parentTips) {
                document.getElementById('detail-parent-content').innerText = poi.parentTips;
                tipBox.classList.remove('hidden');
            } else {
                tipBox.classList.add('hidden');
            }
            
            const footer = document.getElementById('detail-nav-footer');
            footer.innerHTML = `
                <a href="${getNavUrl(poi.navName || poi.name)}" target="_blank" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm text-center shadow-lg active:scale-95 transition-transform"><i class="fas fa-location-arrow mr-2"></i> 開始導航</a>
                ${poi.website ? `
                    <a href="${poi.website}" target="_blank" class="w-14 h-14 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center shadow-sm active:scale-95 transition-transform" title="官方網站">
                        <i class="fas fa-globe text-xl"></i>
                    </a>
                ` : ''}
            `;
            
            if (!document.getElementById('detail-sheet').classList.contains('active')) {
                openSheet('detail-sheet');
            }
        }

        function getNavUrl(dest) { return `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${encodeURIComponent(dest)}&travelmode=driving`; }

        async function handleAIQuery(e) {
            e.preventDefault();
            const input = document.getElementById('ai-input');
            const userText = input.value.trim();
            if (!userText) return;

            appendMsg(userText, 'user');
            input.value = '';
            document.getElementById('ai-loading').classList.remove('hidden');

            try {
                const currentDataStr = JSON.stringify(currentTravelData);
                const fullPrompt = await AIPrompts.buildFullPrompt(userText, currentDataStr);
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullPrompt: fullPrompt,
                        systemInstruction: AIPrompts.systemInstruction 
                    })
                });
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，導遊休息中，請稍後再問我。";
                appendMsg(aiText, 'ai');
            } catch (err) {
                appendMsg(`連線失敗: 可能是環境不支援 API 呼叫，請檢查設定。`, 'ai');
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        function appendMsg(text, role) {
            const container = document.getElementById('ai-response-container');
            const div = document.createElement('div');
            div.className = role === 'user' 
                ? "bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none ml-10 text-sm shadow-sm" 
                : "bg-purple-50 p-4 rounded-2xl rounded-tl-none mr-10 text-sm border border-purple-100 shadow-sm";
            div.innerHTML = text.replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.onload = async () => {
            currentTravelData = await fetchTripData();
            renderApp();
            
            initSheetGestures('detail-sheet', 'handle-detail');
            initSheetGestures('ai-sheet', 'handle-ai');
        };
    </script>
</body>
</html>
